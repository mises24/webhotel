<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>HotelsByDay - Contact</title>

    <meta name="description" content="Get in touch with HotelsByDay - we answer within 1-2 days.">
    <meta name="author" content="HotelsByDay">

    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <header class="header">
        <div class="header-inner">
            <img src="images/logo.png" alt="Hotel Logo" class="logo">
            <img src="images/hotel.png" alt="Hotel View" class="header-image">
        </div>
    </header>

    <nav class="nav">
        <div class="nav-inner">
            <div class="nav-title">Contact</div>

            <div class="hamburger" id="hamburger">
                ☰
            </div>

            <div class="nav-links" id="navLinks">
                <a href="index.html">Welcome</a>
                <a href="book.html">Book</a>
                <a href="contact.html">Contact</a>
                <a href="about.html">About Us</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="content-grid">
            <div class="box">
                <h2>Stay in touch!</h2>
                <p>
                    Please reach out to us by filling in the form to the right! We normally answer within 1-2 business
                    days.
                </p>
            </div>

            <div class="box">
                <h2>Contact</h2>
                <form id="contactForm">

                    <input type="text" name="name" placeholder="Your Name" required pattern="[A-Za-z\s]+"
                        title="Only letters and spaces allowed">

                    <input type="email" name="email" placeholder="Your Email" required>

                    <textarea rows="5" name="message" placeholder="Your Message" required minlength="10"></textarea>

                    <button type="submit">Send</button>

                </form>
            </div>
        </div>
    </div>

    <footer class="footer">
        HotelsByDay | Panorama View St. | 0123456789 | hotelsbyday@email.com
    </footer>

    <script>
        const hamburger = document.getElementById("hamburger");
        const navLinks = document.getElementById("navLinks");

        hamburger.addEventListener("click", () => {
            navLinks.classList.toggle("active");
        });
    </script>

</body>

</html>
